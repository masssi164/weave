name: CI
on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      WEAVE_BASE_URL:
        description: "Base URL for the live Weave backend stack"
        required: false
        default: ""
      WEAVE_TEST_USERNAME:
        description: "Username for the live-stack integration test account"
        required: true
  workflow_call:
    inputs:
      WEAVE_BASE_URL:
        type: string
        required: false
        default: ""
      WEAVE_TEST_USERNAME:
        type: string
        required: true
    secrets:
      WEAVE_TEST_PASSWORD:
        required: true

jobs:
  build:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter gen-l10n
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: dart format --output=none --set-exit-if-changed .
      - run: flutter analyze --fatal-infos
      - run: flutter test

  integration-test:
    name: Live Stack Integration Test
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on:
      - self-hosted
      - macOS
      - ARM64
      - weave-live
    timeout-minutes: 45
    env:
      WEAVE_BASE_URL: ${{ inputs.WEAVE_BASE_URL }}
      WEAVE_TEST_USERNAME: ${{ inputs.WEAVE_TEST_USERNAME }}
      WEAVE_TEST_PASSWORD: ${{ secrets.WEAVE_TEST_PASSWORD }}
      WEAVE_BOOTSTRAP_ENV: /tmp/weave-infra/weave-workspace/.generated/bootstrap.env
      WEAVE_INTEGRATION_TEST_DEVICE: macos
    steps:
      - uses: actions/checkout@v4
      - name: Free disk space on self-hosted runner
        run: |
          rm -rf "$HOME/Library/Developer/Xcode/DerivedData"
          rm -rf "$GITHUB_WORKSPACE/build"
      - name: Verify local live-stack bootstrap env
        run: |
          test -f /tmp/weave-infra/weave-workspace/.generated/bootstrap.env
      - name: Use host Flutter SDK
        run: flutter --version
      - run: flutter pub get
      - run: flutter gen-l10n
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: make integration-test
